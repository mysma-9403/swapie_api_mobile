upstream swapie_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_webhook:10m rate=100r/m;

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name api.swapie.pl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.swapie.pl;

    # SSL (Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/api.swapie.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.swapie.pl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit (for file uploads)
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # Auth endpoints - strict rate limit
    location ~ ^/api/auth/(login|sms-code|verify_code|complete-registration|login-sms|verify-login-sms|forgot-password|reset-password) {
        limit_req zone=api_auth burst=3 nodelay;
        proxy_pass http://swapie_backend;
        include /etc/nginx/proxy_params;
    }

    # Stripe webhook - higher limit, no auth
    location = /api/v1/stripe/webhook {
        limit_req zone=api_webhook burst=20 nodelay;
        proxy_pass http://swapie_backend;
        include /etc/nginx/proxy_params;
    }

    # All other API routes
    location / {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://swapie_backend;
        include /etc/nginx/proxy_params;
    }

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://swapie_backend;
        access_log off;
    }

    access_log /var/log/nginx/api.swapie.pl.access.log;
    error_log /var/log/nginx/api.swapie.pl.error.log;
}
